name: aurora
description: "Aurora E-commerce - Multi-vendor marketplace platform"
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend & Database
  supabase_flutter: ^2.12.0
  sqlite3: ^3.1.6
  provider: ^6.1.5+1

  # Authentication & Security
  flutter_secure_storage: ^10.0.0
  local_auth: ^2.3.0
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # Location Services
  geolocator: ^14.0.2
  permission_handler: ^12.0.0+1
  geocoding: ^4.0.0
  fl_chart: ^1.1.1

  # UI Components
  country_picker: ^2.0.27
  qr_flutter: ^4.1.0
  window_manager: ^0.4.3 # Desktop window management

  # Image Handling
  image_picker: ^1.0.7
  image_cropper: ^8.0.2
  image: ^4.5.2 # For image optimization
  cached_network_image: ^3.3.1 # For caching network images
  flutter_cache_manager: ^3.3.1 # For advanced cache management

  # Storage & Caching
  shared_preferences: ^2.2.2
  path_provider: ^2.1.5
  path: ^1.9.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2
  share_plus: ^10.1.4

  # Push Notifications (Firebase)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Network & Connectivity
  connectivity_plus: ^6.0.5

  # State Management
  flutter_lints: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing Framework
  mockito: ^5.4.4
  mocktail: ^1.0.3
  integration_test:
    sdk: flutter

  # Test Utilities
  build_runner: ^2.4.8
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  generate: true
