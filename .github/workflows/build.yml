# .github/workflows/build.yml
# Automated Flutter Build with Secure Configuration

name: Build Flutter App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetch all history for versioning

      # Step 2: Setup Java (required for Android build)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "11"

      # Step 3: Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      # Step 4: Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Step 5: Analyze code
      - name: Analyze Code
        run: flutter analyze

      # Step 6: Run tests
      - name: Run Tests
        run: flutter test

      # Step 7: Build APK with secure configuration
      - name: Build APK (Release)
        run: flutter build apk \
          --release \
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --dart-define=SUPABASE_ANON_KEY= ${ eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mb3ZmeHNmYXpsd3ZjYWtwdWVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjY0MDcsImV4cCI6MjA4NzcwMjQwN30.QYx8-c9IiSMpuHeikKz25MKO5o6g112AKj4Tnr4aWzI} \
          --build-name=1.0.0 \
          --build-number=${{ github.run_number }}

      # Step 8: Build App Bundle (for Google Play)
      - name: Build App Bundle
        run: flutter build appbundle \
          --release \
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
          --build-name=1.0.0 \
          --build-number=${{ github.run_number }}

      # Step 9: Upload APK as artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # Step 10: Upload App Bundle as artifact
      - name: Upload App Bundle Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release-bundle
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Step 11: Create release (if on main branch)
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0+${{ github.run_number }}
          name: Release v1.0.0+${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          body: |
            ## Automated Build

            **Build Number:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Changes
            ${{ github.event.head_commit.message }}

            ### Artifacts
            - [Download APK](https://github.com/${{ github.repository }}/releases/download/v1.0.0+${{ github.run_number }}/app-release.apk)
            - [Download App Bundle](https://github.com/${{ github.repository }}/releases/download/v1.0.0+${{ github.run_number }}/app-release.aab)

            ---
            *This is an automated release generated by GitHub Actions*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Build for iOS (requires macOS runner)
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: build
    if: false # Disabled by default - enable when you have iOS signing setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios \
          --release \
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
          --no-codesign # Disable codesign for CI

      - name: Upload iOS Build
        uses: actions/upload-artifact@v3
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  # Optional: Deploy to Firebase App Distribution
  deploy-firebase:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download APK Artifact
        uses: actions/download-artifact@v3
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Build ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Changes: ${{ github.event.head_commit.message }}
